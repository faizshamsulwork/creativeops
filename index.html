<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adtechinno | Creative Ops Portal</title>
    <style>
        :root {
            --muji-bg: #fdfcfb;
            --muji-text: #3c3c3c;
            --muji-border: #e6e6e6;
            --muji-accent: #7a8471; /* Sage Green */
        }
        body { font-family: 'Inter', sans-serif; background: var(--muji-bg); color: var(--muji-text); margin: 0; display: flex; }
        .sidebar { width: 250px; border-right: 1px solid var(--muji-border); height: 100vh; padding: 40px 20px; position: fixed; background: #fff; }
        .main-content { margin-left: 250px; padding: 60px; width: 100%; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border: 1px solid var(--muji-border); padding: 25px; border-radius: 8px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #888; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--muji-border); border-radius: 4px; font-family: inherit; }
        .btn-black { background: #000; color: #fff; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: 600; }
        .status-tag { font-size: 0.7rem; padding: 3px 10px; border-radius: 12px; background: #eee; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="letter-spacing: 2px;">ADTECHINNO</h2>
        <div onclick="showPage('dashboard')" style="cursor:pointer; margin-bottom: 15px;">📊 Queue Board</div>
        <div onclick="showPage('request')" style="cursor:pointer; margin-bottom: 15px;">➕ New Request</div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="page active">
            <h1>Creative Queue</h1>
            <div id="requestList"></div>
        </div>

        <div id="request" class="page">
            <h1>New Creative Brief</h1>
            <div class="card" style="max-width: 600px;">
                <div class="form-group">
                    <label>Client Name</label>
                    <input type="text" id="clientName" placeholder="Contoh: Cagamas">
                </div>
                <div class="form-group">
                    <label>Creative Type</label>
                    <select id="assetType">
                        <option value="Static">Static Image</option>
                        <option value="Video">Video / Reels</option>
                        <option value="Carousel">Carousel Post</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="deadline">
                </div>
                <div class="form-group">
                    <label>Creative Brief / Copywriting</label>
                    <textarea id="brief" rows="5" placeholder="Masukkan headline, visual direction, dll..."></textarea>
                </div>
                <button class="btn-black" onclick="hantarRequest()">Submit Request & Notify Faiz</button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8660418607:AAH-Lz-n3qIy6dNZ02BgF8RtsmGSnsrAI_s';
        const CHAT_ID = '5964232885';

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'dashboard') paparkanSenarai();
        }

        async function hantarRequest() {
            const data = {
                client: document.getElementById('clientName').value,
                type: document.getElementById('assetType').value,
                date: document.getElementById('deadline').value,
                brief: document.getElementById('brief').value,
                status: 'Backlog'
            };

            if(!data.client || !data.date) return alert("Sila lengkapkan maklumat!");

            // Simpan ke LocalStorage
            let senarai = JSON.parse(localStorage.getItem('adtech_requests')) || [];
            senarai.push(data);
            localStorage.setItem('adtech_requests', JSON.stringify(senarai));

            // Hantar ke Telegram
            const mesej = `🚀 *NEW CREATIVE REQUEST*\n\n📁 Client: ${data.client}\n🎨 Type: ${data.type}\n📅 Deadline: ${data.date}\n📝 Brief: ${data.brief}`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: mesej, parse_mode: 'Markdown' })
                });
                alert("Request berjaya dihantar ke Telegram!");
            } catch (e) { console.error(e); }

            showPage('dashboard');
        }

        function paparkanSenarai() {
            const list = document.getElementById('requestList');
            const senarai = JSON.parse(localStorage.getItem('adtech_requests')) || [];
            list.innerHTML = senarai.length ? '' : '<p>Tiada request buat masa ini.</p>';
            
            senarai.forEach((req, index) => {
                list.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${req.client} - ${req.type}</strong>
                            <span class="status-tag">${req.status}</span>
                        </div>
                        <p style="font-size:0.9rem; color:#666;">${req.brief}</p>
                        <small>Due: ${req.date}</small>
                    </div>
                `;
            });
        }

        window.onload = paparkanSenarai;
    </script>
</body>
</html>
