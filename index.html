<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adtechinno | Creative Engine v5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --muji-bg: #fdfcfb; --muji-text: #3c3c3c; --muji-border: #e6e6e6; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--muji-bg); color: var(--muji-text); 
            margin: 0; display: flex; flex-direction: row; min-height: 100vh; 
        }

        /* Responsive Sidebar */
        .sidebar { 
            width: 260px; border-right: 1px solid var(--muji-border); padding: 40px 20px; 
            background: #fff; position: fixed; height: 100vh; box-sizing: border-box; z-index: 100;
        }

        .logo { font-weight: 700; letter-spacing: 3px; margin-bottom: 40px; font-size: 1.1rem; text-align: center; }

        .nav-item { 
            padding: 12px 15px; cursor: pointer; font-size: 0.85rem; color: #888; 
            border-radius: 6px; margin-bottom: 5px; transition: 0.2s; 
        }
        .nav-item:hover, .nav-item.active { background: #f5f5f5; color: #000; font-weight: 600; }

        /* Main Content */
        .main-content { 
            margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; transition: 0.3s;
        }

        .page { display: none; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }

        /* Grid Stats (Responsive) */
        .grid-stats { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 10px; margin-bottom: 30px; 
        }
        .stat-card { background: white; border: 1px solid var(--muji-border); padding: 12px; border-radius: 8px; text-align: center; }
        .stat-card strong { font-size: 1.1rem; display: block; }

        /* Cards */
        .card { background: white; border: 1px solid var(--muji-border); padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        
        /* Form */
        .form-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 600; margin-bottom: 5px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--muji-border); border-radius: 6px; font-size: 0.9rem; box-sizing: border-box; }

        .btn-submit { background: #000; color: #fff; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        .badge { font-size: 0.65rem; padding: 4px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
        .status-pending { background: #fff7ed; color: #9a3412; }
        .status-approved { background: #f0fdf4; color: #166534; }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; position: relative; padding: 20px; 
                border-right: none; border-bottom: 1px solid var(--muji-border); 
            }
            .logo { margin-bottom: 20px; }
            .nav-container { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; }
            .nav-item { white-space: nowrap; margin-bottom: 0; padding: 8px 15px; }
            .main-content { margin-left: 0; padding: 20px; }
            .grid-stats { grid-template-columns: repeat(3, 1fr); }
            h1 { font-size: 1.4rem; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ADTECHINNO</div>
        <div class="nav-container">
            <div class="nav-item active" onclick="showPage('workload')">Workload</div>
            <div class="nav-item" onclick="showPage('request')">New Request</div>
            <div class="nav-item" onclick="showPage('settings')">Settings</div>
        </div>
    </div>

    <div class="main-content">
        <div id="workload" class="page active">
            <h1>Creative Workload</h1>
            <div class="grid-stats" id="teamStats"></div>
            <h2 style="font-weight: 500; font-size: 1.1rem;">Project Queue</h2>
            <div id="projectList"></div>
        </div>

        <div id="request" class="page">
            <h1>Request Form</h1>
            <div class="card">
                <div class="form-section">
                    <div class="form-group">
                        <label>Assignee</label>
                        <select id="pAssign">
                            <optgroup label="Malaysia Team">
                                <option value="MY-Abel">MY-Abel (Copywriter)</option>
                                <option value="MY-Simon">MY-Simon (Video)</option>
                                <option value="MY-Alya">MY-Alya (GD)</option>
                                <option value="MY-Steven">MY-Steven (GD)</option>
                                <option value="MY-Aaron">MY-Aaron (GD)</option>
                                <option value="MY-Faiz">MY-Faiz (CL)</option>
                            </optgroup>
                            <optgroup label="Indonesia Team">
                                <option value="ID-Miftahul Fikri">ID-Miftahul Fikri (SM)</option>
                                <option value="ID-Youke Yap">ID-Youke Yap (GD)</option>
                                <option value="ID-Annisya Ninis">ID-Annisya Ninis (Cop)</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group"><label>Client / Brand</label><input type="text" id="pClient"></div>
                    <div class="form-group"><label>Project Name</label><input type="text" id="pName"></div>
                    <div class="form-group">
                        <label>Creative Type</label>
                        <select id="pType">
                            <option>Static Graphic</option><option>Carousel</option><option>Short Video</option>
                            <option>Motion Graphics</option><option>Copywriting Only</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-group"><label>Size / Platform</label><input type="text" id="pSize"></div>
                    <div class="form-group"><label>Deadline</label><input type="date" id="pDeadline"></div>
                    <div class="form-group"><label>Brief Details</label><textarea id="pBrief" rows="4"></textarea></div>
                </div>

                <button class="btn-submit" onclick="submitRequest()">Submit & Notify Telegram</button>
            </div>
        </div>

        <div id="settings" class="page">
            <h1>Settings</h1>
            <button onclick="localStorage.clear(); location.reload();" style="border: 1px solid red; color: red; padding: 10px; cursor: pointer; background: none; border-radius: 5px; width: 100%;">Reset All Data</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8660418607:AAH-Lz-n3qIy6dNZ02BgF8RtsmGSnsrAI_s';
        const CHAT_ID = '5964232885';
        const SLIDE_TEMPLATE = "https://docs.google.com/presentation/d/1pd63VK-tqOfVlfLSJs3KRLAAdSdOVjNvpSuZFbxoEYo/copy";

        let db = JSON.parse(localStorage.getItem('at_ops_v5')) || [];
        const team = ["MY-Abel", "MY-Simon", "MY-Alya", "MY-Steven", "MY-Aaron", "MY-Faiz", "ID-Miftahul Fikri", "ID-Youke Yap", "ID-Annisya Ninis"];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'workload') render();
        }

        async function submitRequest() {
            const client = document.getElementById('pClient').value;
            const name = document.getElementById('pName').value;
            const deadline = document.getElementById('pDeadline').value;
            if(!client || !name || !deadline) return alert("Lengkapkan maklumat!");

            const jobID = `AT26-${(db.length + 1).toString().padStart(3, '0')}`;
            const req = { id: Date.now(), jobID, client, name, assign: document.getElementById('pAssign').value, type: document.getElementById('pType').value, size: document.getElementById('pSize').value, deadline, brief: document.getElementById('pBrief').value, status: 'pending' };

            db.push(req);
            localStorage.setItem('at_ops_v5', JSON.stringify(db));

            const text = `🚨 *NEW REQUEST: ${jobID}*\n\n🏢 Client: ${client}\n👤 Assignee: ${req.assign}\n📅 Due: ${deadline}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' }) });

            alert(`Success! Job ${jobID} created.`);
            showPage('workload');
        }

        function approve(id) {
            const i = db.findIndex(x => x.id === id);
            db[i].status = 'approved';
            localStorage.setItem('at_ops_v5', JSON.stringify(db));
            render();
        }

        function copyWA(id) {
            const item = db.find(x => x.id === id);
            const msg = `*CREATIVE PLAYBOOK READY*\n\nJob ID: ${item.jobID}\nClient: ${item.client}\nProject: ${item.name}\nAssignee: ${item.assign}\nDeadline: ${item.deadline}\n\nPlaybook:\n${SLIDE_TEMPLATE}`;
            navigator.clipboard.writeText(msg);
            alert("WhatsApp message copied!");
        }

        function render() {
            document.getElementById('teamStats').innerHTML = team.map(m => `<div class="stat-card"><small style="font-size:0.5rem;">${m}</small><strong>${db.filter(x => x.assign === m && x.status === 'approved').length}</strong></div>`).join('');
            document.getElementById('projectList').innerHTML = db.slice().reverse().map(item => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div><small>${item.jobID}</small><h3 style="margin:0; font-size:1rem;">${item.client}: ${item.name}</h3></div>
                        <span class="badge status-${item.status}">${item.status}</span>
                    </div>
                    <p style="font-size:0.8rem; color:#666;">${item.assign} | ${item.type} | Due: ${item.deadline}</p>
                    ${item.status === 'pending' ? `<button class="btn-submit" style="padding:8px; font-size:0.7rem;" onclick="approve(${item.id})">Approve Project</button>` : `<button onclick="copyWA(${item.id})" style="background:#25d366; color:white; border:none; padding:8px; border-radius:5px; font-size:0.7rem; width:100%;">Copy WhatsApp</button>`}
                </div>
            `).join('');
        }

        window.onload = render;
    </script>
</body>
</html>
