<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adtechinno | Creative Ops Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --muji-bg: #fdfcfb; --muji-text: #3c3c3c; --muji-border: #e6e6e6; }
        body { font-family: 'Inter', sans-serif; background: var(--muji-bg); color: var(--muji-text); margin: 0; display: flex; flex-direction: row; min-height: 100vh; }
        .sidebar { width: 260px; border-right: 1px solid var(--muji-border); padding: 40px 20px; background: #fff; position: fixed; height: 100vh; box-sizing: border-box; z-index: 100; }
        .logo { font-weight: 700; letter-spacing: 3px; margin-bottom: 40px; font-size: 1.1rem; text-align: center; color: #000; }
        .nav-item { padding: 12px 15px; cursor: pointer; font-size: 0.85rem; color: #888; border-radius: 6px; margin-bottom: 5px; }
        .nav-item.active { background: #f5f5f5; color: #000; font-weight: 600; }
        .main-content { margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        .page { display: none; max-width: 850px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        .card { background: white; border: 1px solid var(--muji-border); padding: 30px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
        .form-section { border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 25px; }
        .form-section h3 { font-size: 0.85rem; margin-bottom: 15px; color: #000; border-left: 3px solid #000; padding-left: 12px; text-transform: uppercase; }
        label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--muji-border); border-radius: 6px; font-size: 0.9rem; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; }
        .checkbox-item input { width: auto; margin: 0; }
        .btn-submit { background: #000; color: #fff; border: none; padding: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; font-size: 0.9rem; }
        .badge { font-size: 0.65rem; padding: 4px 8px; border-radius: 10px; font-weight: 600; text-transform: uppercase; }
        .status-pending { background: #fff7ed; color: #9a3412; }
        .status-approved { background: #f0fdf4; color: #166534; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; position: relative; padding: 20px; border-right: none; border-bottom: 1px solid var(--muji-border); } .main-content { margin-left: 0; padding: 20px; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ADTECHINNO</div>
        <div class="nav-container">
            <div class="nav-item active" onclick="showPage('workload')">Workload Board</div>
            <div class="nav-item" onclick="showPage('request')">New Request</div>
        </div>
    </div>

    <div class="main-content">
        <div id="workload" class="page active">
            <h1>Creative Workload</h1>
            <div id="projectList">Fetching data...</div>
        </div>

        <div id="request" class="page">
            <h1>Creative Request Form</h1>
            <div class="card">
                <div class="form-section">
                    <h3>1. Requester Details</h3>
                    <label>Your Name</label>
                    <select id="requesterName">
                        <option value="">-- Select Your Name --</option>
                        <optgroup label="Malaysia">
                            <option>MY - Ain Sabrina</option><option>MY - Ammelia</option><option>MY - Angie Ng</option>
                            <option>MY - Bernice Mah</option><option>MY - Boon Jie Xin</option><option>MY - Chong Jia Jun</option>
                            <option>MY - Dillon Frederick Kugan</option><option>MY - Darren (Boo Hwa Chian)</option>
                            <option>MY - Hao Yun</option><option>MY - Joanne Yap</option><option>MY - Joseph Chong</option>
                            <option>MY - Kevin Tan</option><option>MY - Lina Leong</option><option>MY - Nurul Iman Natasha</option>
                            <option>MY - Syaheerah Atiqah</option><option>MY - Wilson Ng Guan De</option><option>MY - Xuan Lee</option>
                            <option>MY - Zulkarnain Mustapa</option><option>MY - Faiz Shamsul</option>
                        </optgroup>
                        <optgroup label="Indonesia">
                            <option>ID - Angelina</option><option>ID - Annisya Y.</option><option>ID - Arbaasya D.F.</option>
                            <option>ID - Areta G.P.</option><option>ID - Ashley Karamoy</option><option>ID - Avira P.P.</option>
                            <option>ID - Ayu Aprillia</option><option>ID - Fadhil Zuhayr</option><option>ID - Fajar Abhirama</option>
                            <option>ID - Jap Hetty</option><option>ID - Joanne Chan</option><option>ID - Lutfan Allen R.</option>
                            <option>ID - Marlina S.</option><option>ID - Miftahul Fikri</option><option>ID - Moh. Reza P.</option>
                            <option>ID - Naufal Hilmy</option><option>ID - Tiffani Y.</option><option>ID - Verincia T.</option>
                            <option>ID - Youke Yap</option>
                        </optgroup>
                    </select>
                    <label>Office/Region</label>
                    <select id="pRegion">
                        <option>Malaysia</option><option>Indonesia</option><option>Singapore</option>
                        <option>Hong Kong</option><option>Vietnam</option><option>Japan</option><option>China</option>
                    </select>
                </div>

                <div class="form-section">
                    <h3>2. Project Details</h3>
                    <label>Client Name</label><input type="text" id="pClient">
                    <label>Project Title</label><input type="text" id="pTitle">
                </div>

                <div class="form-section">
                    <h3>3. Job Type</h3>
                    <div class="checkbox-group" id="jobTypes">
                        <label class="checkbox-item"><input type="checkbox" value="Poster/Graphic"> Poster/Graphic</label>
                        <label class="checkbox-item"><input type="checkbox" value="Video Production"> Video Production</label>
                        <label class="checkbox-item"><input type="checkbox" value="Copywriting/Article"> Copywriting/Article</label>
                        <label class="checkbox-item"><input type="checkbox" value="Presentation Deck"> Presentation Deck</label>
                        <label class="checkbox-item"><input type="checkbox" value="Monthly Content Plan"> Monthly Content Plan</label>
                    </div>
                </div>

                <div class="form-section">
                    <h3>4. Briefing</h3>
                    <label>Objective</label>
                    <select id="pObjective"><option>Traffic</option><option>Awareness</option><option>Sales</option><option>Other</option></select>
                    <label>Key Briefing Points</label><textarea id="pBrief" rows="4"></textarea>
                    <label>Ref/Moodboard Link</label><input type="text" id="pRefLink">
                    <label>Deadline</label><input type="date" id="pDeadline">
                    <label>Remarks</label><textarea id="pRemarks" rows="2"></textarea>
                </div>
                <button class="btn-submit" onclick="submitRequest()">Submit to Cloud</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iesotisvudyalggyrgxaq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imllc290aXN2dWR5YWxneXJneGFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzE2NTgsImV4cCI6MjA4ODkwNzY1OH0.-hxy9X7gxce8XvTyvHKGXtLilDujhZUSo_Twx2HXv_U';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const myTeam = ["MY-Abel", "MY-Simon", "MY-Alya", "MY-Steven", "MY-Aaron", "MY-Faiz"];
        const idTeam = ["ID-Miftahul Fikri", "ID-Youke Yap", "ID-Annisya Ninis"];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'workload') fetchAndRender();
        }

        async function submitRequest() {
            const requester = document.getElementById('requesterName').value;
            const client = document.getElementById('pClient').value;
            const deadline = document.getElementById('pDeadline').value;
            if(!requester || !client || !deadline) return alert("Please fill in required fields!");

            const selectedTypes = Array.from(document.querySelectorAll('#jobTypes input:checked')).map(cb => cb.value).join(', ');

            try {
                const { count } = await _supabase.from('creative_ops').select('*', { count: 'exact', head: true });
                const jobID = `AT26-${((count || 0) + 1).toString().padStart(3, '0')}`;

                const { error } = await _supabase.from('creative_ops').insert([{
                    job_id: jobID, requester_name: requester, region: document.getElementById('pRegion').value,
                    client_name: client, project_title: document.getElementById('pTitle').value,
                    job_type: selectedTypes, objective: document.getElementById('pObjective').value,
                    brief: document.getElementById('pBrief').value, ref_link: document.getElementById('pRefLink').value,
                    deadline: deadline, remarks: document.getElementById('pRemarks').value,
                    status: 'pending', assignee: 'Unassigned'
                }]);

                if(error) throw error;
                alert("Request Submitted! Job ID: " + jobID);
                showPage('workload');
            } catch (err) { alert("Error: " + err.message); }
        }

        async function assignWork(id, jobID) {
            const designer = document.getElementById('assign-' + id).value;
            if(designer === 'Unassigned') return alert("Please select a designer!");
            await _supabase.from('creative_ops').update({ assignee: designer, status: 'approved' }).eq('id', id);
            fetchAndRender();
        }

        async function fetchAndRender() {
            try {
                const { data, error } = await _supabase.from('creative_ops').select('*').order('created_at', { ascending: false });
                if(error) throw error;

                document.getElementById('projectList').innerHTML = data.length ? data.map(item => `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <div><small>${item.job_id}</small><h3>${item.client_name}: ${item.project_title}</h3></div>
                            <span class="badge status-${item.status}">${item.status}</span>
                        </div>
                        <p style="font-size:0.8rem; color:#666;">By: ${item.requester_name} | Due: ${item.deadline}</p>
                        ${item.status === 'pending' ? `
                            <select id="assign-${item.id}" style="padding:10px; font-size:0.8rem;">
                                <option value="Unassigned">-- Assign Designer --</option>
                                <optgroup label="Malaysia">${myTeam.map(t => `<option value="${t}">${t}</option>`).join('')}</optgroup>
                                <optgroup label="Indonesia">${idTeam.map(t => `<option value="${t}">${t}</option>`).join('')}</optgroup>
                            </select>
                            <button class="btn-submit" style="padding:10px; font-size:0.75rem; margin-top:5px;" onclick="assignWork(${item.id}, '${item.job_id}')">Approve & Assign</button>
                        ` : `<p style="font-size:0.75rem;"><strong>Assigned to:</strong> ${item.assignee}</p>`}
                        <button onclick="deleteTask(${item.id})" style="color:red; font-size:0.6rem; border:none; background:none; cursor:pointer; margin-top:10px; opacity:0.3;">Delete</button>
                    </div>
                `).join('') : '<p>No projects found.</p>';
            } catch (err) { document.getElementById('projectList').innerHTML = "Error: " + err.message; }
        }

        async function deleteTask(id) {
            if(confirm("Confirm delete?")) { await _supabase.from('creative_ops').delete().eq('id', id); fetchAndRender(); }
        }

        window.onload = fetchAndRender;
    </script>
</body>
</html>
