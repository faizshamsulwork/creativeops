<script>
    const SUPABASE_URL = 'https://iesotisvudyalggyrgxaq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imllc290aXN2dWR5YWxneXJneGFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzE2NTgsImV4cCI6MjA4ODkwNzY1OH0.-hxy9X7gxce8XvTyvHKGXtLilDujhZUSo_Twx2HXv_U';
    
    // Inisialisasi Supabase dengan error handling
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const myTeam = ["MY-Abel", "MY-Simon", "MY-Alya", "MY-Steven", "MY-Aaron", "MY-Faiz"];
    const idTeam = ["ID-Miftahul Fikri", "ID-Youke Yap", "ID-Annisya Ninis"];
    const PLAYBOOK_LINK = "https://docs.google.com/presentation/d/1pd63VK-tqOfVlfLSJs3KRLAAdSdOVjNvpSuZFbxoEYo/copy";

    async function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'workload') fetchAndRender();
    }

    async function submitRequest() {
        const client = document.getElementById('pClient').value;
        const deadline = document.getElementById('pDeadline').value;
        if(!client || !deadline) return alert("Sila isi maklumat!");

        try {
            const { count } = await _supabase.from('creative_ops').select('*', { count: 'exact', head: true });
            const jobID = `AT26-${((count || 0) + 1).toString().padStart(3, '0')}`;

            const { error } = await _supabase.from('creative_ops').insert([{
                job_id: jobID, client, type: document.getElementById('pType').value,
                size: document.getElementById('pSize').value, deadline,
                brief: document.getElementById('pBrief').value, status: 'pending', assign: 'Unassigned'
            }]);

            if(error) throw error;
            alert(`Berjaya! Job ID: ${jobID}`);
            showPage('workload');
        } catch (err) {
            alert("Ralat: Cuba tutup AdBlocker anda. Detail: " + err.message);
        }
    }

    async function assignWork(id, jobID) {
        const designer = document.getElementById(`assign-${id}`).value;
        if(designer === 'Unassigned') return alert("Pilih designer!");

        try {
            const { error } = await _supabase.from('creative_ops').update({ assign: designer, status: 'approved' }).eq('id', id);
            if(error) throw error;
            const msg = `*CREATIVE PLAYBOOK READY*\n\nJob ID: ${jobID}\nDesigner: ${designer}\nPlaybook: ${PLAYBOOK_LINK}`;
            navigator.clipboard.writeText(msg);
            alert("Assigned! WhatsApp message copied.");
            fetchAndRender();
        } catch (err) {
            alert("Ralat: " + err.message);
        }
    }

    async function deleteTask(id) {
        if(!confirm("Betul ke nak padam request ni?")) return;
        try {
            const { error } = await _supabase.from('creative_ops').delete().eq('id', id);
            if(error) throw error;
            fetchAndRender();
        } catch (err) {
            alert("Gagal padam: " + err.message);
        }
    }

    async function fetchAndRender() {
        try {
            const { data, error } = await _supabase.from('creative_ops').select('*').order('created_at', { ascending: false });
            if(error) throw error;

            const team = [...myTeam, ...idTeam];
            document.getElementById('teamStats').innerHTML = team.map(m => `
                <div class="stat-card"><strong>${data.filter(x => x.assign === m && x.status === 'approved').length}</strong><br><small>${m}</small></div>
            `).join('');

            document.getElementById('projectList').innerHTML = data.length ? data.map(item => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <div><small>${item.job_id}</small><h3 style="margin:0;">${item.client}</h3></div>
                        <span class="badge status-${item.status}">${item.status}</span>
                    </div>
                    <p style="font-size:0.8rem; color:#666;">${item.type} | Due: ${item.deadline}</p>
                    ${item.status === 'pending' ? `
                        <select id="assign-${item.id}" style="margin-top:10px; padding:10px; font-size:0.8rem;">
                            <option value="Unassigned">-- Assign Designer --</option>
                            <optgroup label="Malaysia">${myTeam.map(t => `<option value="${t}">${t}</option>`).join('')}</optgroup>
                            <optgroup label="Indonesia">${idTeam.map(t => `<option value="${t}">${t}</option>`).join('')}</optgroup>
                        </select>
                        <button class="btn-submit" style="padding:10px; font-size:0.75rem; margin-top:5px;" onclick="assignWork(${item.id}, '${item.job_id}')">Approve & Assign</button>
                    ` : `<p style="font-size:0.75rem; background:#f9f9f9; padding:10px; border-radius:5px;"><strong>Assigned to:</strong> ${item.assign}</p>`}
                    <button onclick="deleteTask(${item.id})" style="border:none; background:none; color:red; font-size:0.6rem; cursor:pointer; margin-top:10px; opacity:0.5;">Delete Request</button>
                </div>
            `).join('') : '<p>Tiada projek aktif.</p>';
        } catch (err) {
            document.getElementById('projectList').innerHTML = "Gagal memuat data: " + err.message;
        }
    }

    window.onload = fetchAndRender;
</script>
