<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adtechinno | Creative Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --muji-bg: #fdfcfb; --muji-text: #3c3c3c; --muji-border: #e6e6e6; --sage: #7a8471; }
        body { font-family: 'Inter', sans-serif; background: var(--muji-bg); color: var(--muji-text); margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 250px; border-right: 1px solid var(--muji-border); height: 100vh; padding: 40px 20px; position: fixed; background: #fff; }
        .nav-item { padding: 12px; cursor: pointer; font-size: 0.85rem; color: #888; border-radius: 6px; margin-bottom: 5px; }
        .nav-item.active { background: #f5f5f5; color: #000; font-weight: 600; }

        /* Content */
        .main-content { margin-left: 250px; padding: 60px; width: 100%; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        /* UI Elements */
        .card { background: white; border: 1px solid var(--muji-border); padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .status-backlog { background: #eee; }
        .status-active { background: #dcfce7; color: #166534; }
        
        /* Form */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; font-weight: 600; margin-bottom: 5px; color: #888; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--muji-border); border-radius: 4px; font-family: inherit; }
        .btn-black { background: #000; color: #fff; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; width: 100%; }
        
        /* Playbook Box */
        .playbook-box { background: #f0f7ff; border: 1px solid #cce3ff; padding: 15px; border-radius: 6px; margin-top: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="letter-spacing: 2px;">ADTECHINNO</h2>
        <div class="nav-item active" onclick="showPage('workload')">Workload Dashboard</div>
        <div class="nav-item" onclick="showPage('request')">New Creative Request</div>
        <div class="nav-item" onclick="showPage('settings')">Settings</div>
    </div>

    <div class="main-content">
        
        <div id="workload" class="page active">
            <h1>Team Workload</h1>
            <div class="grid-3" id="workloadStats"></div>
            <h2 style="margin-top: 40px;">Active Project Queue</h2>
            <div id="projectList"></div>
        </div>

        <div id="request" class="page">
            <h1>New Request</h1>
            <div class="card" style="max-width: 600px;">
                <div class="form-group">
                    <label>Client / Project Name</label>
                    <input type="text" id="pName" placeholder="Cagamas Campaign">
                </div>
                <div class="form-group">
                    <label>Assign Designer</label>
                    <select id="pAssign">
                        <option value="Amir">Amir</option>
                        <option value="Sarah">Sarah</option>
                        <option value="Hafiz">Hafiz</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="pType">
                        <option>Static Graphic</option>
                        <option>Video / Reels</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Deadline</label>
                    <input type="date" id="pDeadline">
                </div>
                <div class="form-group">
                    <label>Brief Details</label>
                    <textarea id="pBrief" rows="3"></textarea>
                </div>
                <button class="btn-black" onclick="submitRequest()">Submit Request</button>
            </div>
        </div>

        <div id="settings" class="page">
            <h1>Admin</h1>
            <button onclick="localStorage.clear(); location.reload();" style="color:red;">Clear All Data</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8660418607:AAH-Lz-n3qIy6dNZ02BgF8RtsmGSnsrAI_s';
        const CHAT_ID = '5964232885';
        const SLIDE_TEMPLATE = "https://docs.google.com/presentation/d/1pd63VK-tqOfVlfLSJs3KRLAAdSdOVjNvpSuZFbxoEYo/copy";

        let db = JSON.parse(localStorage.getItem('at_engine_db')) || [];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'workload') renderDashboard();
        }

        function generateJobID() {
            const year = new Date().getFullYear().toString().substr(-2);
            const count = (db.length + 1).toString().padStart(3, '0');
            return `AT${year}-${count}`;
        }

        async function submitRequest() {
            const jobID = generateJobID();
            const name = document.getElementById('pName').value;
            const assign = document.getElementById('pAssign').value;
            const type = document.getElementById('pType').value;
            const deadline = document.getElementById('pDeadline').value;
            const brief = document.getElementById('pBrief').value;

            if(!name) return alert("Nama projek wajib!");

            const req = { id: Date.now(), jobID, name, assign, type, deadline, brief, status: 'pending' };
            db.push(req);
            localStorage.setItem('at_engine_db', JSON.stringify(db));

            // Notify Telegram
            const text = `🚨 *NEW REQUEST: ${jobID}*\nProject: ${name}\nAssign: ${assign}\nDeadline: ${deadline}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });

            showPage('workload');
        }

        function approveProject(id) {
            const i = db.findIndex(x => x.id === id);
            db[i].status = 'approved';
            db[i].playbook = SLIDE_TEMPLATE;
            localStorage.setItem('at_engine_db', JSON.stringify(db));
            renderDashboard();
        }

        function copyWhatsApp(id) {
            const item = db.find(x => x.id === id);
            const msg = `*CREATIVE PLAYBOOK READY*\n\nJob ID: ${item.jobID}\nProject: ${item.name}\nDesigner: ${item.assign}\nDeadline: ${item.deadline}\n\nSila rujuk Creative Playbook di sini untuk detail design:\n${item.playbook}\n\nCc: @CreativeTeam`;
            
            navigator.clipboard.writeText(msg);
            alert("WhatsApp Message Copied! Sila paste di group Adtechinno.");
        }

        function renderDashboard() {
            const list = document.getElementById('projectList');
            const stats = document.getElementById('workloadStats');
            
            // Render Workload Stats
            const counts = {};
            ['Amir', 'Sarah', 'Hafiz'].forEach(d => counts[d] = db.filter(x => x.assign === d && x.status === 'approved').length);
            stats.innerHTML = '';
            for(let d in counts) {
                stats.innerHTML += `<div class="card" style="text-align:center;"><small>${d}</small><div><strong>${counts[d]} Active Tasks</strong></div></div>`;
            }

            // Render Queue
            list.innerHTML = db.slice().reverse().map(item => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <span><strong>${item.jobID}</strong>: ${item.name}</span>
                        <span class="badge ${item.status === 'approved' ? 'status-active' : 'status-backlog'}">${item.status}</span>
                    </div>
                    <p>Type: ${item.type} | Designer: ${item.assign} | Deadline: ${item.deadline}</p>
                    ${item.status === 'pending' ? 
                        `<button class="btn-black" style="width:auto; font-size:0.7rem;" onclick="approveProject(${item.id})">Approve & Generate Playbook</button>` : 
                        `<div class="playbook-box">
                            📖 Playbook: <a href="${item.playbook}" target="_blank">Open Google Slides</a><br><br>
                            <button onclick="copyWhatsApp(${item.id})" style="cursor:pointer; font-size:0.7rem;">Copy WhatsApp Message</button>
                        </div>`
                    }
                </div>
            `).join('');
        }

        window.onload = renderDashboard;
    </script>
</body>
</html>
